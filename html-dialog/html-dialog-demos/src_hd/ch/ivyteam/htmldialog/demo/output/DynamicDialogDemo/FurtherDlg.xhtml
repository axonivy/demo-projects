<html xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html"
  xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <ui:composition template="/layouts/frame.xhtml">
    <ui:define name="title">Final Dialog</ui:define>
    <ui:define name="content">
      <h:form id="furtherDialogForm">
        <p:outputLabel>This is the called Dynamic Further Dialog</p:outputLabel>
        <br /><br />

        <p:commandButton style="width:180px" id="closeDialog"
          actionListener="#{ivyDynamicDialog.close('FurtherDlg')}"
          value="Close Further Dialog" icon="ui-icon-check"
          update="furtherDialogForm" />
      </h:form>
    </ui:define>
  </ui:composition>

</h:body>

</html>
