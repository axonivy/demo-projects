<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="jakarta.faces.core"
  xmlns:h="jakarta.faces.html" xmlns:ui="jakarta.faces.facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <h:form id="form2">
    <br></br>
    <p:fieldset legend="#{ivy.cms.co('/Dialogs/agileBPM/task_Form/Done')}" styleClass="panel">
      <!-- This `escape="false"` usage is safe as the content is a static CMS entry -->
      <h:outputText escape="false" value="#{ivy.cms.co('/Texts/ToDo-Explain')}" />
      <p:commandButton actionListener="#{logic.done(true)}" value="#{ivy.cms.co('/Dialogs/agileBPM/task_Form/Done')}"
        title="#{ivy.cms.co('/Dialogs/agileBPM/task_Form/ConfirmTodo')}" update="form2" icon="ti ti-check">
      </p:commandButton>
      <p:spacer width="10"></p:spacer>
      <p:commandButton actionListener="#{logic.done(false)}"
        value="#{ivy.cms.co('/Dialogs/agileBPM/task_Form/Decline')}"
        title="#{ivy.cms.co('/Dialogs/agileBPM/task_Form/DeclineTodo')}" update="form2" icon="ti ti-x">
      </p:commandButton>
    </p:fieldset>
  </h:form>

</h:body>

</html>
